---
AllCops:
  TargetRubyVersion: 4.0
  NewCops: enable

plugins:
  - rubocop-performance
  - rubocop-rspec

Style/ConditionalAssignment:
  Enabled: false
Style/FrozenStringLiteralComment:
  Enabled: false
Style/StringLiterals:
  EnforcedStyle: double_quotes
Style/LambdaCall:
  Enabled: false
Style/SymbolArray:
  Enabled: false
Style/WordArray:
  Enabled: false
Style/RegexpLiteral:
  Enabled: false
Style/Documentation:
  Enabled: false
Layout/FirstArrayElementIndentation:
  EnforcedStyle: consistent
Layout/FirstHashElementIndentation:
  EnforcedStyle: consistent
Layout/SpaceInsideBlockBraces:
  Enabled: false
Layout/MultilineMethodCallIndentation:
  Enabled: false
Layout/ParameterAlignment:
  Enabled: false
Layout/ArrayAlignment:
  EnforcedStyle: with_fixed_indentation
Layout/LineLength:
  Enabled: true
  Max: 80
# These specs stub RPC methods provided dynamically via method_missing (e.g.
# Neovim::Buffer#get_lines), which verifying doubles cannot check.
RSpec/VerifiedDoubles:
  Exclude:
    - spec/lib/nvim_control/data_extractor_spec.rb
    - spec/lib/nvim_control/controller_spec.rb
# Response fixtures are held in `let` blocks; the JSON literals are too large to
# inline without breaking RSpec/ExampleLength, so the group exceeds five.
RSpec/MultipleMemoizedHelpers:
  Exclude:
    - spec/lib/nvim_control/controller_spec.rb
